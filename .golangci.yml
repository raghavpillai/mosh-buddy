run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gosec
    - goconst
    - gofmt
    - bodyclose

linters-settings:
  gosec:
    excludes:
      - G204 # subprocess launched with variable - expected for exec use case
