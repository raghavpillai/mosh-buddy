name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Build all targets
        run: |
          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${pair%/*}"
            arch="${pair#*/}"
            GOOS="$os" GOARCH="$arch" go build -ldflags="-s -w" -o "mb-${os}-${arch}" ./cmd/mb
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mb-linux-amd64
            mb-linux-arm64
            mb-darwin-amd64
            mb-darwin-arm64
