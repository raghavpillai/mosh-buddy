name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - run: go test -race -count=1 ./...

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o mb-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/mb
      - uses: actions/upload-artifact@v4
        with:
          name: mb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mb-${{ matrix.goos }}-${{ matrix.goarch }}
